# Mobile-base pose estimation (for TF / RViz). Consumes the anchored vive_world
# tracker poses and publishes vive_world -> mobile_base TF + /vive_world/mobile_base/pose.
# Keep the offsets IN SYNC with hyumm_nrt/hyumm_scan_xddp_node (which sends XDDP).

world_frame: vive_world
base_frame: mobile_base
input_ns: /vive_world
rear: tracker_mobile_rear
front: tracker_mobile_front

# Tracker positions relative to the base center, in the base frame (meters).
# Mirror hyumm_scan_xddp_node OFFSET_REAR_*/OFFSET_FRONT_*.
offset_rear_x: -0.395
offset_rear_y: -0.235
offset_front_x: 0.420
offset_front_y: 0.235

occlusion_timeout: 0.1   # s; a tracker older than this is treated as occluded
publish_pose: true
