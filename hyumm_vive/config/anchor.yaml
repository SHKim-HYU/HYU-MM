# vive_world anchor configuration.
# The reference (fixed) tracker's pose DEFINES vive_world: once locked, the
# reference reads exactly anchor_position with anchor_orientation, so with
# identity orientation the fixed tracker's axes ARE the vive_world axes.

reference: tracker_fixed          # device whose pose defines vive_world
world_frame: vive_world           # output frame this node owns
source_frame: libsurvive_world    # backend (vive_libsurvive_ros) frame
input_ns: /vive                   # backend topic namespace (raw)
output_ns: /vive_world            # anchored topic namespace this node publishes

settle_samples: 30                # average this many reference frames before locking
warmup_samples: 0                 # discard this many early (jittery) reference frames first
publish_twist: true               # relay body-frame twist to output_ns (unchanged)
drift_warn_pos: 0.03              # warn if the locked reference later moves > this (m)
drift_warn_deg: 3.0               # ... or rotates > this (deg) -- i.e. the fixed tracker was bumped

# Surveyed pose of the fixed tracker in vive_world.
# NOTE: hyumm_scan_xddp_node has its OWN independent fixed-tracker calibration
# with REF_Z = 0.8. That is deliberate and separate from this node's vive_world;
# the two 'ref' frames differ by a pure +0.1 m z (x,y,yaw agree, and scan_xddp
# overwrites z with yaw anyway). Do NOT blindly sync one to the other -- confirm
# the true surveyed height first if you reconcile them.
anchor_position: [1.5, 0.3, 0.9]
# 4 = quaternion [x,y,z,w] (identity below) OR 3 = [roll,pitch,yaw] (rad).
# Identity => the fixed tracker's mounting orientation defines the vive_world axes.
anchor_orientation: [0.0, 0.0, 0.0, 1.0]

# Devices to republish in vive_world (must match backend friendly names).
trackers: [tracker_fixed, tracker_mobile_rear, tracker_mobile_front]
